<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تثبيت الأرصدة | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            width: 100%;
            max-width: 550px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .header h2 { margin: 0; color: #1e293b; font-size: 1.8rem; }
        .header p { color: #64748b; margin-top: 5px; }

        /* ستايل التبويب (Tabs) للاختيار بين صندوق/شبكة/عميل */
        .type-selector {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: 0.3s;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 0.9rem; }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
            background: #f8fafc;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
        }

        .footer-link a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .footer-link a:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="header">
        <i class="fas fa-coins"></i>
        <h2>الأرصدة الافتتاحية</h2>
        <p>تثبيت أرصدة بداية المدة للنظام</p>
    </div>

    <!-- اختيار نوع الرصيد -->
    <div class="type-selector">
        <button class="tab-btn active" onclick="switchType('box', this)">
            <i class="fas fa-cash-register"></i> صناديق
        </button>
        <button class="tab-btn" onclick="switchType('network', this)">
            <i class="fas fa-wifi"></i> شبكات
        </button>
        <button class="tab-btn" onclick="switchType('client', this)">
            <i class="fas fa-user-tag"></i> عملاء
        </button>
    </div>

    <div class="form-body">
        <div class="form-group">
            <label id="targetLabel">اختيار الصندوق</label>
            <select id="targetItem">
                <option value="">-- اختر من القائمة --</option>
            </select>
        </div>

        <div class="form-group">
            <label>المبلغ الافتتاحي</label>
            <input type="number" id="amount" placeholder="0.00">
        </div>

        <div class="form-group">
            <label>العملة</label>
            <select id="currency">
                <option value="YER">ريال يمني</option>
                <option value="SAR">ريال سعودي</option>
                <option value="USD">دولار أمريكي</option>
            </select>
        </div>

        <button class="btn-submit" onclick="submitOpening()">
            <i class="fas fa-check-circle"></i> تثبيت الرصيد الآن
        </button>
    </div>

    <div class="footer-link">
        <a href="system-admin.html"><i class="fas fa-arrow-right"></i> العودة للوحة الإدارة</a>
    </div>
</div>

<script src="database.js"></script>
<script>
    let currentType = 'box';

    function switchType(type, btn) {
        currentType = type;
        // تحديث شكل الأزرار
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // تحديث العناوين والقوائم
        const label = document.getElementById('targetLabel');
        if(type === 'box') label.innerText = "اختيار الصندوق";
        else if(type === 'network') label.innerText = "اختيار الشبكة";
        else label.innerText = "اختيار العميل";

        loadItems(); // إعادة تحميل البيانات في القائمة المنسدلة
    }

    function loadItems() {
        const select = document.getElementById('targetItem');
        select.innerHTML = '<option value="">-- اختر من القائمة --</option>';
        
        let items = [];
        if(currentType === 'box') {
            items = ["الصندوق الرئيسي", "صندوق المبيعات", "صندوق الحوالات"]; // أمثلة ثابتة أو من DB
        } else if(currentType === 'network') {
            items = ["الامتياز", "النجم", "يمن كاش", "الأكوع"];
        } else {
            // جلب العملاء من database.js
            const clients = (typeof DB !== 'undefined') ? DB.getClients() : [];
            items = clients.map(c => c.name);
        }

        items.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item;
            opt.innerText = item;
            select.appendChild(opt);
        });
    }

    function submitOpening() {
        const item = document.getElementById('targetItem').value;
        const amt = document.getElementById('amount').value;
        const curr = document.getElementById('currency').value;

        if(!item || !amt) return alert("يرجى إكمال البيانات");

        const data = {
            category: currentType,
            name: item,
            amount: parseFloat(amt),
            currency: curr,
            date: new Date().toLocaleDateString()
        };

        // حفظ في database.js
        if(typeof DB !== 'undefined') {
            DB.saveOpeningBalance(data);
            alert(`✅ تم بنجاح تثبيت رصيد (${item}) بمبلغ ${amt} ${curr}`);
            document.getElementById('amount').value = '';
        }
    }

    // تحميل أولي عند فتح الصفحة
    window.onload = loadItems;
</script>

</body>
</html>
