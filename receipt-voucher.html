<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
    if (!sessionStorage.getItem('isLoggedIn')) {
        window.location.href = 'login.html';
    }
</script>
    <meta charset="UTF-8">
    <title>سند قبض جديد | إتقان المحاسبي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #0f172a; --accent: #10b981; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; height: 100vh; padding: 20px; position: sticky; top: 0; }
        .sidebar a { color: #94a3b8; text-decoration: none; display: block; padding: 12px; border-radius: 8px; margin-bottom: 5px; }
        .sidebar a:hover { background: #1e293b; color: white; }

        .main-content { flex: 1; padding: 40px; }
        .voucher-card { background: white; max-width: 800px; margin: 0 auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); padding: 30px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; color: #475569; font-size: 14px; }
        input, select, textarea { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }

        .btn-submit { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { background: #059669; transform: translateY(-2px); }
        
        .voucher-header { text-align: center; border-bottom: 2px dashed #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="text-align: center;">إتقان</h2>
    <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
    <a href="receipt-voucher.html" style="background:#1e293b; color:white;"><i class="fas fa-file-import"></i> سند قبض</a>
    <a href="network-balances.html"><i class="fas fa-network-wired"></i> أرصدة الشبكات</a>
</aside>

<main class="main-content">
    <div class="voucher-card">
        <div class="voucher-header">
            <h2 style="margin:0; color: var(--accent);"><i class="fas fa-file-invoice-dollar"></i> إنشاء سند قبض (وارد)</h2>
            <small>إضافة مبالغ إلى صناديق الشركة</small>
        </div>

        <form id="receiptForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>تاريخ السند</label>
                    <input type="date" id="v_date" required>
                </div>
                <div class="input-group">
                    <label>رقم السند (تلقائي)</label>
                    <input type="text" id="v_no" readonly style="background:#f1f5f9">
                </div>
                <div class="input-group">
                    <label>المستلم من (العميل/الشركة)</label>
                    <input type="text" id="v_client" placeholder="اسم المسلم للمبلغ" required>
                </div>
                <div class="input-group">
                    <label>العملة</label>
                    <select id="v_currency">
                        <option value="USD">دولار أمريكي (USD)</option>
                        <option value="SAR">ريال سعودي (SAR)</option>
                        <option value="YER">ريال يمني (YER)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>المبلغ</label>
                    <input type="number" id="v_amount" placeholder="0.00" step="0.01" required>
                </div>
                <div class="input-group">
                    <label>طريقة القبض</label>
                    <select id="v_method">
                        <option value="نقداً">نقداً (في الصندوق)</option>
                        <option value="تحويل">تحويل بنكي</option>
                        <option value="شبكة">عبر شبكة تحويل</option>
                    </select>
                </div>
            </div>

            <div class="input-group" style="margin-top:20px;">
                <label>البيان (شرح العملية)</label>
                <textarea id="v_note" rows="3" placeholder="اكتب هنا تفاصيل سبب القبض..."></textarea>
            </div>

            <button type="submit" class="btn-submit">تأكيد وحفظ السند <i class="fas fa-check-circle"></i></button>
        </form>
    </div>
</main>

<script src="database.js"></script>
<script>
    // كود لتعبئة قائمة المنسدلة بأسماء العملاء المخزنين
function fillClientSelect() {
    const selectElement = document.getElementById('clientSelect'); // تأكد أن الـ ID مطابق للـ select في HTML
    const savedClients = JSON.parse(localStorage.getItem('clients')) || [];
    
    // مسح القائمة أولاً لتجنب التكرار
    selectElement.innerHTML = '<option value="">اختر العميل...</option>';
    
    savedClients.forEach(client => {
        let option = document.createElement('option');
        option.value = client.name; // أو client.id
        option.textContent = client.name;
        selectElement.appendChild(option);
    });
}

// تشغيل الدالة فور فتح الصفحة
window.onload = fillClientSelect;
    window.onload = function() {
        
    const clientSelect = document.getElementById('clientSelect'); // معرف قائمة الاختيار
    const savedClients = JSON.parse(localStorage.getItem('clients')) || [];

    savedClients.forEach(client => {
        let option = document.createElement('option');
        option.value = client.id;
        option.text = client.name;
        clientSelect.appendChild(option);
    });
};
    // توليد رقم سند عشوائي عند التحميل
    document.getElementById('v_no').value = "RC-" + Math.floor(Math.random() * 10000);
    document.getElementById('v_date').valueAsDate = new Date();

    document.getElementById('receiptForm').onsubmit = function(e) {
        e.preventDefault();

        const data = {
            amount: document.getElementById('v_amount').value,
            currency: document.getElementById('v_currency').value,
            client: document.getElementById('v_client').value,
            note: document.getElementById('v_note').value,
            type: "سند قبض"
        };

        // 1. تحديث رصيد الصندوق في قاعدة البيانات (زيادة الرصيد)
        let balances = DB.getBalances();
        balances[data.currency] += parseFloat(data.amount);
        DB.saveBalances(balances);

        // 2. تسجيل العملية في جدول العمليات
        DB.addOperation({
            type: "سند قبض",
            client: data.client,
            amount: data.amount,
            currency: data.currency,
            network: document.getElementById('v_method').value,
            date: new Date().toLocaleString('ar-YE')
        });

        alert("✅ تم حفظ السند وإضافة المبلغ للرصيد بنجاح");
        window.location.href = "index.html"; // العودة للرئيسية لمشاهدة التحديث
    };
</script>

</body>
</html>
