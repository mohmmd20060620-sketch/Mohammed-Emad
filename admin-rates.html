<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحديث أسعار الصرف | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --bg-body: #f8fafc;
            --card-bg: #1e293b; /* ثيم داكن للأسعار */
            --text-light: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
        }

        .settings-box {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: var(--text-light);
        }

        h3 { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #334155; padding-bottom: 15px; }

        .exchange-management-panel { margin-top: 20px; }

        .control-group {
            background: #0f172a;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-right: 5px solid #0ea5e9;
        }

        .inputs-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr auto;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
        }

        input[type="number"] {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-size: 1.1rem;
        }

        .btn-buy, .btn-sell {
            cursor: pointer;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-buy { background: #10b981; color: white; }
        .btn-sell { background: #f59e0b; color: white; }

        .btn-save-rates {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="settings-box">
    <h3><i class="fas fa-sync-alt"></i> إدارة أسعار الصرف (تحديث لحظي)</h3>

    <div class="exchange-management-panel">
        <!-- قسم الدولار الأمريكي -->
        <div class="control-group">
            <h4>الدولار الأمريكي (USD)</h4>
            <div class="inputs-row">
                <input type="number" id="input-USD-BUY" placeholder="شراء">
                <button class="btn-buy" onclick="updateRate('USD_BUY')">تحديث</button>
                
                <input type="number" id="input-USD-SELL" placeholder="بيع">
                <button class="btn-sell" onclick="updateRate('USD_SELL')">تحديث</button>
            </div>
        </div>

        <!-- قسم الريال السعودي -->
        <div class="control-group">
            <h4>الريال السعودي (SAR)</h4>
            <div class="inputs-row">
                <input type="number" id="input-SAR-BUY" placeholder="شراء">
                <button class="btn-buy" onclick="updateRate('SAR_BUY')">تحديث</button>
                
                <input type="number" id="input-SAR-SELL" placeholder="بيع">
                <button class="btn-sell" onclick="updateRate('SAR_SELL')">تحديث</button>
            </div>
        </div>
    </div>

    <button onclick="saveNewRates()" class="btn-save-rates">
        <i class="fas fa-check-circle"></i> اعتماد جميع الأسعار الجديدة
    </button>
    
    <a href="system-admin.html" class="back-link">العودة للوحة الإدارة</a>
</div>

<script src="database.js"></script>
<script>
    function updateExchangeRate() {
    const newRate = document.getElementById('rateInput').value;
    const currencyType = "SAR/YER";

    // بعد التحديث في قاعدة البيانات
    AuditLogger.log(
        "تعديل صرف", 
        `قام الموظف بتعديل سعر صرف ${currencyType} إلى ${newRate}`
    );
}
    // وظيفة التحديث المنفرد بناءً على الدوال في database.js
    function updateRate(type) {
        const inputId = 'input-' + type.replace('_', '-');
        const value = document.getElementById(inputId).value;
        
        if(!value) return alert("يرجى إدخال السعر أولاً");

        if(typeof DB !== 'undefined' && DB.updateSingleRate) {
            DB.updateSingleRate(type, value);
            alert("تم تحديث " + type + " بنجاح");
        } else {
            console.error("دالة updateSingleRate غير معرفة في database.js");
        }
    }

    // وظيفة حفظ الكل
    function saveNewRates() {
        // في حال أردت تنفيذ إجراء إضافي عند الحفظ الكلي
        alert("✅ تم اعتماد وتثبيت كافة الأسعار في النظام");
        window.location.href = 'system-admin.html';
    }
</script>

</body>
</html>
