<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb; /* أزرق هادئ */
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --border-color: #e2e8f0;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-light); /* خلفية فاتحة ومريحة */
            overflow: hidden;
        }

        /* حاوية الدخول */
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); /* ظل ناعم */
            text-align: center;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px); /* تفاعل خفيف عند الحوم */
        }

        .logo-box {
            width: 70px;
            height: 70px;
            background: #eff6ff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .logo-box i {
            font-size: 35px;
            color: var(--primary);
        }

        h2 {
            margin: 0 0 10px;
            color: var(--text-dark);
            font-size: 26px;
            font-weight: 800;
        }

        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        /* تفاعل الحقول عند التركيز */
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-group input:focus + i {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-login:active {
            transform: scale(0.98); /* تأثير الضغط */
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            background: #fef2f2;
            padding: 10px;
            border-radius: 8px;
        }

        /* تأثير الاهتزاز عند الخطأ */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

    <div class="login-card" id="loginCard">
        <div class="logo-box">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h2>إتقان بروو</h2>
        <p>يرجى تسجيل الدخول للوصول إلى لوحة التحكم</p>

        <div id="errorArea" class="error-msg">بيانات الدخول غير صحيحة!</div>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم" required>
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">دخول النظام</button>
        </form>

        <div style="margin-top: 30px; font-size: 12px; color: #94a3b8;">
            نظام إتقان المحاسبي &copy; 2026
        </div>
    </div>
<script src="database.js"></script>
   <script>
    // بيانات المستخدمين الافتراضية داخل الصفحة مباشرة لضمان العمل
    const DefaultDB = {
        getUsers: function() {
            const data = localStorage.getItem('itqan_users');
            if (data) return JSON.parse(data);
            
            const users = [
                { 
                    id: "admin123",
                    name: "عبدالعظيم", 
                    username: "admin", 
                    password: "123",   
                    role: "مدير النظام",
                    permissions: { send: true, receive: true, reports: true, admin: true, delete: true }
                }
            ];
            localStorage.setItem('itqan_users', JSON.stringify(users));
            return users;
        }
    };

    // سجل العمليات داخل الصفحة
    const LocalLogger = {
        log: function(action, details, userName) {
            let logs = JSON.parse(localStorage.getItem('system_logs')) || [];
            const newLog = {
                id: Date.now(),
                timestamp: new Date().toLocaleString('ar-YE'),
                userName: userName || "النظام",
                action: action,
                details: details
            };
            logs.unshift(newLog);
            localStorage.setItem('system_logs', JSON.stringify(logs));
        }
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const userVal = document.getElementById('username').value.trim();
        const passVal = document.getElementById('password').value.trim();
        const errorArea = document.getElementById('errorArea');
        const loginCard = document.getElementById('loginCard');
        const btn = document.getElementById('loginBtn');

        btn.innerText = "جاري التحقق...";
        
        // جلب المستخدمين والتحقق
        const users = DefaultDB.getUsers();
        const foundUser = users.find(u => u.username === userVal && u.password === passVal);

        setTimeout(() => {
            if (foundUser) {
                // حفظ الجلسة
                localStorage.setItem('currentUser', JSON.stringify(foundUser));
                
                // تسجيل الدخول
                LocalLogger.log("تسجيل دخول", "تم الدخول للنظام بنجاح", foundUser.name);

                window.location.href = 'index.html';
            } else {
                btn.innerText = "دخول النظام";
                errorArea.style.display = 'block';
                loginCard.classList.add('shake');
                setTimeout(() => loginCard.classList.remove('shake'), 400);
            }
        }, 600);
    });
</script>
</body>
</html>
