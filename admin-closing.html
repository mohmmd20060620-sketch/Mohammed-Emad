<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإقفال الدوري | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --danger: #ef4444;
            --primary: #4f46e5;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .closing-card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        /* ستايل اختيار نوع الإقفال */
        .period-selector {
            display: flex;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 14px;
            margin: 25px 0;
        }

        .period-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: bold;
            color: #64748b;
            transition: 0.3s;
            border-radius: 10px;
        }

        .period-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .info-box {
            background: #eef2ff;
            border-right: 4px solid var(--primary);
            padding: 20px;
            border-radius: 12px;
            text-align: right;
            margin-bottom: 30px;
        }

        .info-box h4 { margin: 0 0 10px 0; color: var(--primary); }
        .info-box p { margin: 0; font-size: 0.9rem; color: #475569; line-height: 1.6; }

        .btn-execute {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-weekly { background: #10b981; color: white; }
        .btn-monthly { background: #f59e0b; color: white; }
        .btn-yearly { background: var(--danger); color: white; }

        .back-link { display: inline-block; margin-top: 25px; text-decoration: none; color: #94a3b8; }
    </style>
</head>
<body>

<div class="closing-card">
    <div class="header">
        <i class="fas fa-calendar-check" style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"></i>
        <h2>إقفال الحسابات الدوري</h2>
        <p>اختر الفترة المالية المراد إقفالها وترحيلها</p>
    </div>

    <!-- اختيار الفترة -->
    <div class="period-selector">
        <button class="period-btn" onclick="setPeriod('weekly', this)">إقفال أسبوعي</button>
        <button class="period-btn active" onclick="setPeriod('monthly', this)">إقفال شهري</button>
        <button class="period-btn" onclick="setPeriod('yearly', this)">إقفال سنوي</button>
    </div>

    <div class="info-box" id="infoBox">
        <h4 id="periodTitle">الإقفال الشهري</h4>
        <p id="periodDesc">سيتم ترحيل أرصدة العملاء والصناديق لنهاية الشهر، وإصدار تقرير الأرباح والخسائر الشهري مع أرشفة الحركات المالية.</p>
    </div>

    <button id="mainBtn" class="btn-execute btn-monthly" onclick="runClosing()">
        <i class="fas fa-key"></i> تنفيذ الإقفال الآن
    </button>

    <a href="system-admin.html" class="back-link">العودة للوحة الإدارة</a>
</div>

<script src="database.js"></script>
<script>
    let selectedPeriod = 'monthly';

    function setPeriod(type, btn) {
        selectedPeriod = type;
        
        // تحديث الأزرار
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // تحديث المحتوى
        const title = document.getElementById('periodTitle');
        const desc = document.getElementById('periodDesc');
        const mainBtn = document.getElementById('mainBtn');

        // تغيير الشكل حسب النوع
        mainBtn.className = 'btn-execute';
        
        if(type === 'weekly') {
            title.innerText = "الإقفال الأسبوعي";
            desc.innerText = "مراجعة حركة الخزينة خلال الأسبوع وتثبيت الأرصدة الختامية للبدء بأسبوع جديد.";
            mainBtn.classList.add('btn-weekly');
        } else if(type === 'monthly') {
            title.innerText = "الإقفال الشهري";
            desc.innerText = "ترحيل أرصدة العملاء والصناديق لنهاية الشهر، وإصدار تقرير الأرباح والخسائر الشهري.";
            mainBtn.classList.add('btn-monthly');
        } else {
            title.innerText = "الإقفال السنوي";
            desc.innerText = "إغلاق السنة المالية بالكامل، تدوير الأرصدة للسنة الجديدة، ومنع أي تعديل على القيود السابقة.";
            mainBtn.classList.add('btn-yearly');
        }
    }

    function runClosing() {
        const confirmMsg = `هل أنت متأكد من تنفيذ (${document.getElementById('periodTitle').innerText})؟`;
        if(!confirm(confirmMsg)) return;

        // استدعاء الدوال من database.js بناءً على الاختيار
        if(typeof DB !== 'undefined') {
            if(selectedPeriod === 'weekly') DB.closeWeekly();
            else if(selectedPeriod === 'monthly') DB.closeMonthly();
            else DB.runYearlyClosing();
            
            alert(`✅ تم تنفيذ ${document.getElementById('periodTitle').innerText} بنجاح`);
        }
    }
</script>

</body>
</html>
