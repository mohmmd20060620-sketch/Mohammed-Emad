<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
    if (!sessionStorage.getItem('isLoggedIn')) {
        window.location.href = 'login.html';
    }
</script>
    <meta charset="UTF-8">
    <title>إشعار دائن جديد | إتقان المحاسبي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #0f172a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; height: 100vh; padding: 20px; position: sticky; top: 0; }
        .sidebar a { color: #94a3b8; text-decoration: none; display: block; padding: 12px; border-radius: 8px; margin-bottom: 5px; }
        .sidebar a:hover { background: #1e293b; color: white; }

        .main-content { flex: 1; padding: 40px; }
        .voucher-card { background: white; max-width: 800px; margin: 0 auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); padding: 30px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; color: #475569; font-size: 14px; }
        input, select, textarea { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .btn-submit { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { background: #2563eb; transform: translateY(-2px); }
        
        .voucher-header { text-align: center; border-bottom: 2px dashed #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="text-align: center;">إتقان</h2>
    <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
    <a href="credit-note.html" style="background:#1e293b; color:white;"><i class="fas fa-arrow-circle-down"></i> إشعار دائن</a>
    <a href="receipt-voucher.html"><i class="fas fa-file-import"></i> سند قبض</a>
</aside>

<main class="main-content">
    <div class="voucher-card">
        <div class="voucher-header">
            <h2 style="margin:0; color: var(--accent);"><i class="fas fa-arrow-circle-down"></i> إنشاء إشعار دائن (له)</h2>
            <small>تسجيل مبلغ لمصلحة العميل أو الحساب</small>
        </div>

        <form id="creditForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>تاريخ الإشعار</label>
                    <input type="date" id="c_date" required>
                </div>
                <div class="input-group">
                    <label>رقم الإشعار (تلقائي)</label>
                    <input type="text" id="c_no" readonly style="background:#f1f5f9">
                </div>
                <div class="input-group">
                    <label>الحساب الدائن (العميل)</label>
                    <input type="text" id="c_client" placeholder="اسم العميل المستفيد" required>
                </div>
                <div class="input-group">
                    <label>العملة</label>
                    <select id="c_currency">
                        <option value="USD">دولار أمريكي (USD)</option>
                        <option value="SAR">ريال سعودي (SAR)</option>
                        <option value="YER">ريال يمني (YER)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>المبلغ</label>
                    <input type="number" id="c_amount" placeholder="0.00" step="0.01" required>
                </div>
                <div class="input-group">
                    <label>نوع التسوية</label>
                    <select id="c_type">
                        <option value="عمولة">عمولة تحويل</option>
                        <option value="تعديل رصيد">تعديل خطأ سابق</option>
                        <option value="فوارق صرف">فوارق صرف عملات</option>
                    </select>
                </div>
            </div>

            <div class="input-group" style="margin-top:20px;">
                <label>البيان / تفاصيل الإشعار</label>
                <textarea id="c_note" rows="3" placeholder="اشرح سبب إضافة هذا المبلغ لحساب العميل..."></textarea>
            </div>

            <button type="submit" class="btn-submit">تأكيد وحفظ الإشعار الدائن <i class="fas fa-save"></i></button>
        </form>
    </div>
</main>

<script src="database.js"></script>
<script>
    // إعدادات تلقائية
    document.getElementById('c_no').value = "CN-" + Math.floor(Math.random() * 10000);
    document.getElementById('c_date').valueAsDate = new Date();

    document.getElementById('creditForm').onsubmit = function(e) {
        e.preventDefault();

        const data = {
            amount: parseFloat(document.getElementById('c_amount').value),
            currency: document.getElementById('c_currency').value,
            client: document.getElementById('c_client').value,
            note: document.getElementById('c_note').value
        };

        // ملاحظة: الإشعار الدائن محاسبياً يزيد الرصيد في "كشف حساب العميل" 
        // وسنقوم هنا بزيادة رصيد الصندوق المرتبط بالعملية كإجراء مؤقت
        let balances = DB.getBalances();
        balances[data.currency] += data.amount;
        DB.saveBalances(balances);

        // تسجيل العملية في السجل
        DB.addOperation({
            type: "إشعار دائن",
            client: data.client,
            amount: data.amount,
            currency: data.currency,
            network: "تسوية حسابية",
            date: new Date().toLocaleString('ar-YE')
        });

        alert("✅ تم تسجيل الإشعار الدائن وتحديث الحساب بنجاح");
        window.location.href = "index.html";
    };
</script>

</body>
</html>
