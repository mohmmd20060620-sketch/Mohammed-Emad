<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
  
</script>
    <meta charset="UTF-8">
    <title>أرصدة الشبكات والعملات | إتقان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #0f172a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        .sidebar { width: 250px; background: var(--sidebar-bg); color: white; height: 100vh; padding: 20px; position: sticky; top: 0; }
        .sidebar a { color: #94a3b8; text-decoration: none; display: block; padding: 12px; border-radius: 8px; margin-bottom: 5px; }
        .sidebar a:hover { background: #1e293b; color: white; }

        .main-content { flex: 1; padding: 30px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .network-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .network-table th { background: #f1f5f9; padding: 15px; text-align: center; color: #475569; border: 1px solid #e2e8f0; }
        .network-table td { padding: 10px; border: 1px solid #e2e8f0; text-align: center; }
        
        .currency-input { width: 120px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; font-weight: bold; font-family: 'Consolas', monospace; }
        .currency-input:focus { border-color: var(--accent); outline: none; background: #f0f9ff; }
        
        .btn-save-all { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .btn-save-all:hover { background: #059669; transform: translateY(-2px); }
        
        .network-label { font-weight: bold; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .badge-net { background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="text-align: center;">إتقان</h2>
    <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
    <a href="network-balances.html" style="background:#1e293b; color:white;"><i class="fas fa-network-wired"></i> أرصدة الشبكات</a>
    <a href="company-accounts.html"><i class="fas fa-university"></i> حسابات الشركة</a>
</aside>

<main class="main-content">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2><i class="fas fa-globe text-accent"></i> أرصدة شبكات التحويل (العملات)</h2>
            <button class="btn-save-all" onclick="saveAllNetworks()">حفظ جميع التغييرات <i class="fas fa-save"></i></button>
        </div>
        <p style="color: #64748b; font-size: 14px;">ملاحظة: أدخل الرصيد الحالي لكل شبكة لكل عملة وسيتم حفظها في قاعدة البيانات.</p>

        <table class="network-table">
            <thead>
                <tr>
                    <th rowspan="2">اسم الشركة / الشبكة</th>
                    <th colspan="3">الرصيد الحالي لكل عملة</th>
                </tr>
                <tr>
                    <th style="color: #2563eb;">دولار (USD)</th>
                    <th style="color: #059669;">سعودي (SAR)</th>
                    <th style="color: #dc2626;">يمني (YER)</th>
                </tr>
            </thead>
            <tbody id="network-rows">
                </tbody>
        </table>
    </div>
</main>

<script src="database.js"></script>
<script>
    const networks = ["النجم", "المميز", "الامتياز", "الحزمي", "العالمي", "المحيط"];

   function loadNetworksTable() {
    const tbody = document.getElementById('network-rows');
    // استدعاء الدالة من قاعدة البيانات (database.js)
    const data = DB.getNetworkBalances(); 
    
    tbody.innerHTML = '';

    networks.forEach(name => {
        // نأخذ القيمة من قاعدة البيانات أو نضع 0 كافتراضي
        const bal = data[name] || { USD: 0, SAR: 0, YER: 0 };
        
        const row = `
            <tr>
                <td class="network-label">
                    <span class="badge-net">${networks.indexOf(name) + 1}</span>
                    ${name}
                </td>
                <td><input type="number" class="currency-input" id="usd-${name}" value="${bal.USD}" step="0.01"></td>
                <td><input type="number" class="currency-input" id="sar-${name}" value="${bal.SAR}" step="0.01"></td>
                <td><input type="number" class="currency-input" id="yer-${name}" value="${bal.YER}" step="1"></td>
            </tr>
        `;
        tbody.insertAdjacentHTML('beforeend', row);
    });
}

    function saveAllNetworks() {
        let newData = {};
        networks.forEach(name => {
            newData[name] = {
                USD: parseFloat(document.getElementById(`usd-${name}`).value) || 0,
                SAR: parseFloat(document.getElementById(`sar-${name}`).value) || 0,
                YER: parseFloat(document.getElementById(`yer-${name}`).value) || 0
            };
        });

        DB.saveNetworkBalances(newData);
        alert("✅ تم حفظ وتحديث جميع أرصدة الشبكات بنجاح");
    }

    window.onload = loadNetworksTable;
</script>

</body>
</html>
