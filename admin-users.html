<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الموظفين | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header i { font-size: 1.2rem; color: var(--primary); }
        .card-header h3 { margin: 0; font-size: 1.1rem; font-weight: 700; }

        .card-body { padding: 25px; }

        /* تنسيق نموذج الإضافة */
        .user-form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            align-items: flex-end;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        
        input, select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: var(--primary-hover); }

        /* تنسيق الجدول */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: #f8fafc; padding: 15px; color: var(--text-muted); font-size: 0.85rem; border-bottom: 2px solid var(--border-color); }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .badge-admin { background: #e0e7ff; color: #4338ca; }
        .badge-user { background: #dcfce7; color: #15803d; }

        .btn-delete { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1rem; }
        .btn-delete:hover { color: #b91c1c; }

        .back-link { display: inline-block; margin-top: 20px; text-decoration: none; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <i class="fas fa-users-gear"></i>
            <h3>إدارة وبرمجة الموظفين</h3>
        </div>
        <div class="card-body">
            <!-- نموذج إضافة موظف جديد -->
            <div class="user-form-grid">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="user_name" placeholder="اسم الموظف">
                </div>
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="user_login" placeholder="Login ID">
                </div>
                <div class="form-group">
                    <label>كلمة السر</label>
                    <input type="password" id="user_pass" placeholder="Password">
                </div>
                <div class="form-group">
                    <label>الصلاحية</label>
                    <select id="user_role">
                        <option value="مدير نظام">مدير نظام</option>
                        <option value="مستخدم">مستخدم</option>
                        <option value="مشاهد">مشاهد</option>
                    </select>
                </div>
                <div class="form-group">
                    <button class="btn btn-primary" onclick="addNewUser()">
                        <i class="fas fa-user-plus"></i> إضافة
                    </button>
                </div>
            </div>

            <!-- جدول عرض الموظفين -->
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>الموظف</th>
                            <th>اسم المستخدم</th>
                            <th>كلمة السر</th>
                            <th>الصلاحية</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="users_table_body">
                        <!-- يتم تعبئتها من السكربت -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <a href="system-admin.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للإدارة</a>
</div>

<script src="database.js"></script>
<script>
    // تشغيل عند تحميل الصفحة
    window.onload = () => {
        if (typeof DB !== 'undefined') {
            refreshUsersTable();
        } else {
            alert("فشل في تحميل ملف database.js");
        }
    };

    // تحديث جدول الموظفين
    function refreshUsersTable() {
        const users = DB.getUsers(); // جلب البيانات من القاعدة
        const tbody = document.getElementById('users_table_body');
        tbody.innerHTML = '';
        
        users.forEach(user => {
            const roleClass = user.role === 'مدير نظام' ? 'badge-admin' : 'badge-user';
            tbody.innerHTML += `
                <tr>
                    <td><strong>${user.name}</strong></td>
                    <td>${user.username}</td>
                    <td><code style="background: #eee; padding: 2px 5px; border-radius: 4px;">${user.password || '****'}</code></td>
                    <td><span class="badge ${roleClass}">${user.role}</span></td>
                    <td>
                        ${user.id !== 1 ? 
                        `<button class="btn-delete" onclick="removeUser(${user.id})" title="حذف">
                            <i class="fas fa-trash-can"></i>
                        </button>` : 
                        '<small style="color:#94a3b8">أساسي</small>'}
                    </td>
                </tr>
            `;
        });
    }

    // إضافة موظف جديد
    function addNewUser() {
        const name = document.getElementById('user_name').value;
        const username = document.getElementById('user_login').value;
        const password = document.getElementById('user_pass').value;
        const role = document.getElementById('user_role').value;

        if(!name || !username || !password) return alert("يرجى ملء جميع الحقول");

        const newUser = {
            id: Date.now(),
            name: name,
            username: username,
            password: password,
            role: role
        };
        
        DB.addUser(newUser); // الإضافة للقاعدة
        
        // تنظيف الحقول وإعادة التحميل
        document.getElementById('user_name').value = '';
        document.getElementById('user_login').value = '';
        document.getElementById('user_pass').value = '';
        refreshUsersTable();
        alert("✅ تمت إضافة الموظف بنجاح");
    }

    // حذف موظف
    function removeUser(id) {
        if(confirm("هل أنت متأكد من حذف هذا الموظف؟")) {
            DB.deleteUser(id); // الحذف من القاعدة
            refreshUsersTable();
        }
    }
</script>

</body>
</html>
