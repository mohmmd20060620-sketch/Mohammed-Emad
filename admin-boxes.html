<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ترميز الصناديق | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 850px; margin: 40px auto; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .card-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header i { font-size: 1.5rem; color: var(--primary); }

        .card-body { padding: 25px; }

        .box-form {
            display: grid;
            grid-template-columns: 2fr 2fr auto;
            gap: 15px;
            margin-bottom: 30px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            align-items: flex-end;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        
        input, select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add:hover { background: #4338ca; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--border-color); }
        th { background: #f8fafc; color: #64748b; font-size: 0.9rem; }

        .status-active { color: #10b981; font-weight: bold; }
        .btn-delete { color: #ef4444; border: none; background: none; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <i class="fas fa-cash-register"></i>
            <h3>إدارة وترميز الصناديق</h3>
        </div>
        <div class="card-body">
            <!-- نموذج إضافة صندوق -->
            <div class="box-form">
                <div class="form-group">
                    <label>اسم الصندوق</label>
                    <input type="text" id="box_name" placeholder="مثلاً: صندوق المركز الرئيسي">
                </div>
                <div class="form-group">
                    <label>المسؤول عن الصندوق</label>
                    <select id="box_admin">
                        <!-- سيتم تعبئته من قائمة الموظفين -->
                    </select>
                </div>
                <button class="btn-add" onclick="addNewBox()">إنشاء صندوق</button>
            </div>

            <!-- جدول الصناديق -->
            <table>
                <thead>
                    <tr>
                        <th>اسم الصندوق</th>
                        <th>المسؤول</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="boxes_table_body">
                    <!-- تعبئة تلقائية -->
                </tbody>
            </table>
        </div>
    </div>
    <a href="system-admin.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للإدارة</a>
</div>

<script src="database.js"></script>
<script>
    window.onload = () => {
        loadUsersToSelect();
        refreshBoxesTable();
    };

    // جلب الموظفين لوضعهم كمسؤولين عن الصناديق
    function loadUsersToSelect() {
        const select = document.getElementById('box_admin');
        const users = DB.getUsers ? DB.getUsers() : [];
        users.forEach(u => {
            let opt = document.createElement('option');
            opt.value = u.name;
            opt.text = u.name;
            select.appendChild(opt);
        });
    }

    function refreshBoxesTable() {
        const tbody = document.getElementById('boxes_table_body');
        // جلب الصناديق من قاعدة البيانات أو استخدام الافتراضية
        const boxes = DB.getBoxes ? DB.getBoxes() : [
            { name: "الصندوق الرئيسي", admin: "المدير العام", status: "نشط" }
        ];

        tbody.innerHTML = '';
        boxes.forEach(box => {
            tbody.innerHTML += `
                <tr>
                    <td><strong>${box.name}</strong></td>
                    <td>${box.admin}</td>
                    <td><span class="status-active">${box.status}</span></td>
                    <td>
                        ${box.name === "الصندوق الرئيسي" ? 
                        '<small style="color:#94a3b8">أساسي</small>' : 
                        `<button class="btn-delete" onclick="deleteBox('${box.name}')"><i class="fas fa-trash"></i></button>`}
                    </td>
                </tr>
            `;
        });
    }

    function addNewBox() {
        const name = document.getElementById('box_name').value;
        const admin = document.getElementById('box_admin').value;

        if(!name) return alert("يرجى إدخال اسم الصندوق");

        const newBox = { name, admin, status: "نشط" };
        
        if(DB.addBox) {
            DB.addBox(newBox);
            refreshBoxesTable();
            document.getElementById('box_name').value = '';
            alert("✅ تم إنشاء الصندوق بنجاح");
        }
    }
</script>

</body>
</html>
