<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الصلاحيات | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --sidebar-bg: #0f172a;
            --bg-body: #f1f5f9;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); margin: 0; padding: 20px; }

        .permissions-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header-box {
            background: var(--sidebar-bg);
            color: white;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-selector {
            padding: 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            flex: 1;
            font-size: 16px;
        }

        .permissions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 25px;
        }

        .perm-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #fff;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            transition: 0.3s;
        }

        .perm-item:hover { background: #eef2ff; }

        /* ستايل زر التشغيل/الإيقاف Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 45px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(21px); }

        .save-btn {
            width: 100%;
            padding: 20px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .save-btn:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="permissions-container">
    <div class="header-box">
        <h2 style="margin:0;"><i class="fas fa-user-shield"></i> التحكم في صلاحيات الوصول</h2>
        <a href="index.html" style="color: #94a3b8; text-decoration: none;"><i class="fas fa-times"></i> إغلاق</a>
    </div>

    <div class="user-selector">
        <label>اختر الموظف:</label>
        <select id="userSelect" onchange="loadUserPermissions()">
            <option value="">-- اختر مستخدم لتعديل صلاحياته --</option>
            </select>
    </div>

    <div class="permissions-grid" id="permissionsList">
        <div class="perm-item">
            <label class="switch">
                <input type="checkbox" id="p_send_remittance">
                <span class="slider"></span>
            </label>
            <span>إرسال حوالات</span>
        </div>

        <div class="perm-item">
            <label class="switch">
                <input type="checkbox" id="p_receive_remittance">
                <span class="slider"></span>
            </label>
            <span>استلام حوالات</span>
        </div>

        <div class="perm-item">
            <label class="switch">
                <input type="checkbox" id="p_view_reports">
                <span class="slider"></span>
            </label>
            <span>عرض التقارير المالية</span>
        </div>

        <div class="perm-item">
            <label class="switch">
                <input type="checkbox" id="p_exchange">
                <span class="slider"></span>
            </label>
            <span>تنفيذ عمليات المصارفة</span>
        </div>

        <div class="perm-item">
            <label class="switch">
                <input type="checkbox" id="p_admin">
                <span class="slider"></span>
            </label>
            <span>دخول لوحة التحكم (Admin)</span>
        </div>

        <div class="perm-item">
            <label class="switch">
                <input type="checkbox" id="p_delete">
                <span class="slider"></span>
            </label>
            <span>حذف أو تعديل العمليات</span>
        </div>
    </div>

    <button class="save-btn" onclick="savePermissions()">
        <i class="fas fa-save"></i> حفظ الصلاحيات المحدثة
    </button>
</div>

<script src="database.js"></script>
<script>
    // عند تحميل الصفحة، جلب المستخدمين من database.js
    window.onload = function() {
        const users = DB.getUsers(); // تأكد أن لديك دالة تجلب المستخدمين
        const select = document.getElementById('userSelect');
        users.forEach(u => {
            let opt = document.createElement('option');
            opt.value = u.id;
            opt.innerText = u.name + " (" + u.role + ")";
            select.appendChild(opt);
        });
    };

    function savePermissions() {
        const userId = document.getElementById('userSelect').value;
        if(!userId) return alert("الرجاء اختيار مستخدم أولاً");

        const perms = {
            send: document.getElementById('p_send_remittance').checked,
            receive: document.getElementById('p_receive_remittance').checked,
            reports: document.getElementById('p_view_reports').checked,
            exchange: document.getElementById('p_exchange').checked,
            admin: document.getElementById('p_admin').checked,
            delete: document.getElementById('p_delete').checked
        };

        // حفظ في database.js
        DB.updateUserPermissions(userId, perms);
        alert("✅ تم تحديث صلاحيات الموظف بنجاح");
    }

    function loadUserPermissions() {
        const userId = document.getElementById('userSelect').value;
        const user = DB.getUserById(userId);
        if(user && user.permissions) {
            document.getElementById('p_send_remittance').checked = user.permissions.send;
            document.getElementById('p_receive_remittance').checked = user.permissions.receive;
            // ... وهكذا للبقية
        }
    }
    function savePermissions() {
    const targetUser = document.getElementById('userSelect').options[document.getElementById('userSelect').selectedIndex].text;
    
    // بعد حفظ الصلاحيات
    AuditLogger.log(
        "تعديل صلاحيات", 
        `تم تعديل صلاحيات الوصول للمستخدم: ${targetUser}`
    );
}
</script>

</body>
</html>
