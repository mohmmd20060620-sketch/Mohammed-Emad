<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التسديد - سبأ سنتر</title>
    <style>
        :root {
            --primary: #800000;
            --secondary: #c5a059;
            --bg-dark: #1a237e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .payment-card {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header-section img {
            width: 80px;
            margin-bottom: 10px;
        }

        h2 { color: var(--primary); margin-top: 0; }
        
        .input-group { margin-bottom: 15px; text-align: right; }
        
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; color: var(--bg-dark); }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        #confirm-screen, #success-screen { display: none; }

        .confirm-details {
            background: #fff8e1;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed var(--secondary);
            margin: 20px 0;
            text-align: right;
        }

        .success-animation {
            font-size: 80px;
            color: #2ecc71;
            margin-bottom: 10px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="payment-card">
        
        <div id="step1">
            <div class="header-section">
                <img src="https://img.icons8.com/fluency/96/money-transfer.png">
                <h2>تسديد رصيد</h2>
            </div>
            <div class="input-group">
                <label>رقم الهاتف</label>
                <input type="number" id="phone_input" placeholder="7XXXXXXXX">
            </div>
            <div class="input-group">
                <label>المبلغ (ريال)</label>
                <input type="number" id="amount_input" placeholder="0.00">
            </div>
            <button class="btn-main" onclick="goToConfirm()">تسديد الآن</button>
            <a href="./saba_center.html" class="back-link">إلغاء والعودة</a>
        </div>

        <div id="confirm-screen">
            <h2>تأكيد الطلب</h2>
            <div class="confirm-details">
                <p>الرقم: <b id="display_phone"></b></p>
                <p>المبلغ: <b id="display_amount"></b> ريال</p>
            </div>
            <button class="btn-main" style="background-color: #2ecc71;" onclick="completePayment()">تأكيد وموافق</button>
            <p onclick="location.reload()" class="back-link" style="color: red;">تعديل البيانات</p>
        </div>

        <div id="success-screen">
            <div class="success-animation">✔️</div>
            <h2 style="color: #2ecc71;">تم التسديد!</h2>
            <p>تمت العملية بنجاح وتحويل المبلغ.</p>
            <button class="btn-main" onclick="window.location.href='./saba_center.html'">العودة للرئيسية</button>
        </div>

    </div>

    <script>
        function goToConfirm() {
            const phone = document.getElementById('phone_input').value;
            const amount = document.getElementById('amount_input').value;
            if (phone === "" || amount === "") {
                alert("يرجى إكمال البيانات");
                return;
            }
            document.getElementById('display_phone').innerText = phone;
            document.getElementById('display_amount').innerText = amount;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('confirm-screen').style.display = 'block';
        }

        function completePayment() {
            // نطق العبارة صوتياً
            let msg = new SpeechSynthesisUtterance();
            msg.text = "تم التسديد بنجاح";
            msg.lang = 'ar-SA'; // لغة عربية
            msg.rate = 1; // سرعة الصوت
            window.speechSynthesis.speak(msg);

            // إظهار شاشة النجاح
            document.getElementById('confirm-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
        }
    </script>

</body>
</html>
