<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
    if (!sessionStorage.getItem('isLoggedIn')) {
        window.location.href = 'login.html';
    }
</script>
    <meta charset="UTF-8">
    <title>إدارة العملاء | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- لوحة الألوان المحدثة (احترافية وعصرية) --- */
        :root { 
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-color: #0ea5e9;
            --success-glow: #10b981;
            --danger-glow: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--primary-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            margin: 0; 
            padding: 20px; 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .window-container { 
            background: var(--secondary-bg); 
            width: 100%;
            max-width: 1000px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            border-radius: 24px; 
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .window-header { 
            background: rgba(15, 23, 42, 0.8); 
            padding: 25px 35px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .window-header h2 { 
            margin: 0; 
            font-size: 22px; 
            font-weight: 600;
            /* تم إصلاح تدرج النص هنا ليعمل بشكل صحيح */
            background: linear-gradient(to left, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .tabs { 
            display: flex; 
            background: rgba(0, 0, 0, 0.2); 
            padding: 0 20px; 
            gap: 10px;
        }
        .tab { 
            padding: 15px 25px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 500; 
            color: var(--text-muted); 
            border-bottom: 3px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab:hover { color: var(--accent-color); background: rgba(14, 165, 233, 0.05); }
        .tab.active { 
            color: var(--accent-color); 
            border-bottom-color: var(--accent-color); 
            background: rgba(14, 165, 233, 0.1);
        }

        .form-content { padding: 40px; display: grid; gap: 30px; }
        
        fieldset { 
            border: 1px solid var(--glass-border); 
            background: var(--glass-bg); 
            margin: 0; 
            padding: 30px; 
            border-radius: 18px; 
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        fieldset:hover {
            border-color: rgba(14, 165, 233, 0.3);
            transform: translateY(-2px);
        }

        legend { 
            font-size: 13px; 
            color: var(--accent-color); 
            padding: 0 15px; 
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .row { display: flex; gap: 20px; margin-bottom: 0; flex-wrap: wrap; }
        .input-group { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            min-width: 200px;
        }
        
        label { font-size: 13px; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        label i { color: var(--accent-color); font-size: 14px; }
        
        input, select { 
            padding: 14px 18px; 
            border: 1px solid var(--glass-border); 
            background: var(--input-bg); 
            font-size: 14px; 
            border-radius: 12px; 
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        input:focus, select:focus { 
            border-color: var(--accent-color); 
            background: #1e293b; 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); 
        }
        input[readonly] { background: rgba(0,0,0,0.3); color: var(--accent-color); font-weight: bold; border-style: dashed; }

        .toolbar { 
            background: rgba(15, 23, 42, 0.5); 
            padding: 25px 40px; 
            display: flex; 
            gap: 15px; 
            align-items: center;
            border-top: 1px solid var(--glass-border); 
        }
        
        .tool-btn { 
            display: flex; 
            align-items: center; 
            gap: 10px;
            border: 1px solid transparent;
            cursor: pointer; 
            padding: 12px 24px; 
            border-radius: 12px; 
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-exit { background: transparent; border-color: #334155; color: #94a3b8; }
        .btn-exit:hover { background: #334155; color: white; }
        
        .btn-save { background: var(--accent-color); color: white; box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3); }
        .btn-save:hover { filter: brightness(1.1); transform: scale(1.02); }
        
        .btn-undo { background: rgba(255,255,255,0.05); color: white; }
        .btn-undo:hover { background: rgba(255,255,255,0.1); }

        .btn-print { background: rgba(16, 185, 129, 0.1); color: var(--success-glow); border-color: rgba(16, 185, 129, 0.2); }
        .btn-print:hover { background: var(--success-glow); color: white; }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px 20px;
            border-radius: 12px;
            color: #fca5a5;
            font-weight: 500;
            font-size: 13px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            align-self: flex-end;
            height: 48px;
            box-sizing: border-box;
        }
        input[type="checkbox"] { accent-color: var(--danger-glow); cursor: pointer; }

        select option { background: var(--secondary-bg); color: white; }
    </style>
</head>
<body>

<div class="window-container">
    <div class="window-header">
        <h2><i class="fas fa-id-card"></i> إدارة هوية العملاء</h2>
        <div style="font-size: 12px; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px;">v2.0 Premium Design</div>
    </div>

    <div class="tabs">
        <div class="tab active"><i class="fas fa-user-edit"></i> الملف الشخصي</div>
        <div class="tab"><i class="fas fa-wallet"></i> الإعدادات المالية</div>
        <div class="tab"><i class="fas fa-history"></i> سجل النشاط</div>
    </div>

    <form id="clientForm" class="form-content">
        <!-- هوية العميل -->
        <fieldset>
            <legend>بيانات الهوية والمنشأة</legend>
            <div class="row">
                <div class="input-group" style="max-width: 180px;">
                    <label><i class="fas fa-hashtag"></i> كود العميل</label>
                    <input type="text" id="c_code" readonly>
                </div>
                <div class="input-group" style="flex: 2;">
                    <label><i class="fas fa-building"></i> اسم المنشأة / العميل</label>
                    <input type="text" id="c_name" required placeholder="مثلاً: شركة المحيط للتجارة والاستثمار">
                </div>
            </div>
            <div class="row" style="margin-top: 20px;">
                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> العنوان التفصيلي</label>
                    <input type="text" id="c_address" placeholder="المدينة، الشارع، المبنى">
                </div>
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="c_inactive"> تجميد نشاط الحساب
                </div>
            </div>
        </fieldset>

        <!-- الاتصالات -->
        <fieldset>
            <legend>بيانات التواصل</legend>
            <div class="row">
                <div class="input-group">
                    <label><i class="fas fa-phone-alt"></i> الهاتف الأرضي</label>
                    <input type="text" id="phone1" placeholder="01-xxxxxx">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-mobile-alt"></i> موبايل (أساسي)</label>
                    <input type="text" id="mob1" placeholder="77xxxxxxx">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-mobile"></i> موبايل (إضافي)</label>
                    <input type="text" id="mob2" placeholder="71xxxxxxx">
                </div>
            </div>
        </fieldset>

        <!-- الربط المالي -->
        <fieldset>
            <legend>الربط المحاسبي والإدارة</legend>
            <div class="row">
                <div class="input-group">
                    <label><i class="fas fa-vault"></i> صندوق الربط المالي</label>
                    <select id="c_account">
                        <option value="YER">صندوق الريال اليمني (الرئيسي)</option>
                        <option value="USD">صندوق الدولار الأمريكي</option>
                        <option value="SAR">صندوق الريال السعودي</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user-tie"></i> المدير المسؤول</label>
                    <input type="text" id="c_owner" placeholder="اسم صاحب المنشأة">
                </div>
            </div>
            <div class="input-group" style="margin-top: 20px;">
                <label><i class="fas fa-sticky-note"></i> ملاحظات المحاسب</label>
                <input type="text" id="c_notes" placeholder="ملاحظات ائتمانية أو إدارية...">
            </div>
        </fieldset>

        <div class="toolbar">
            <button type="button" class="tool-btn btn-exit" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-right"></i> رجوع
            </button>
            <button type="reset" class="tool-btn btn-undo">
                <i class="fas fa-sync-alt"></i> تصفير
            </button>
            <button type="button" class="tool-btn btn-print">
                <i class="fas fa-file-invoice"></i> تقرير
            </button>
            <button type="submit" class="tool-btn btn-save" style="margin-right: auto; padding: 12px 45px;">
                <i class="fas fa-save"></i> حفظ في القاعدة
            </button>
        </div>
    </form>
</div>

<script src="database.js"></script>
<script>
    // عند تحميل الصفحة: توليد كود العميل تلقائياً
    window.onload = () => {
        const codeInput = document.getElementById('c_code');
        if (typeof DB !== 'undefined' && typeof DB.generateClientCode === 'function') {
            codeInput.value = DB.generateClientCode();
        } else {
            codeInput.value = "ET-" + Math.floor(1000 + Math.random() * 9000);
        }
    };

    document.getElementById('clientForm').onsubmit = function(e) {
        e.preventDefault();

        const name = document.getElementById('c_name').value.trim();
        const code = document.getElementById('c_code').value;
        const phone = document.getElementById('mob1').value.trim();

        if (name === "") {
            alert("⚠️ يرجى إدخال اسم العميل.");
            return;
        }

        // تجهيز بيانات العميل بشكل متوافق مع نظام "إتقان برو" المركزي
        const clientData = {
            id: Date.now(),
            code: code,
            name: name,
            address: document.getElementById('c_address').value,
            phone: phone,
            mobile2: document.getElementById('mob2').value,
            account: document.getElementById('c_account').value,
            owner: document.getElementById('c_owner').value,
            notes: document.getElementById('c_notes').value,
            status: document.getElementById('c_inactive').checked ? "مجمد" : "نشط",
            balance: 0,
            createdAt: new Date().toISOString()
        };

        try {
            // الحفظ في قاعدة البيانات المركزية (database.js) لضمان ظهوره في التقارير
            if (typeof DB !== 'undefined') {
                // جلب العملاء الحاليين وإضافة الجديد
                let allClients = JSON.parse(localStorage.getItem('itqan_clients')) || [];
                allClients.push(clientData);
                localStorage.setItem('itqan_clients', JSON.stringify(allClients));
                
                // تحديث الـ DB Object إذا كان متاحاً
                if (typeof DB.addClient === 'function') DB.addClient(clientData);
            }

            // تجهيز رابط الواتساب (تنسيق الرقم اليمني)
            let formattedPhone = phone;
            if (phone.startsWith('7')) formattedPhone = '967' + phone;
            else if (phone.startsWith('07')) formattedPhone = '967' + phone.substring(1);

            const message = `*إشعار تسجيل عميل - إتقان برو* 🚀%0A%0A` +
                            `عزيزي العميل: *${name}*%0A` +
                            `تم فتح حسابك بنجاح في النظام.%0A` +
                            `كود العميل: *${code}*%0A%0A` +
                            `شكراً لتعاملك معنا.`;

            const whatsappUrl = `https://wa.me/${formattedPhone}?text=${message}`;

            alert("✅ تم حفظ العميل بنجاح في القاعدة المركزية.");
            
            // فتح واتساب ثم إعادة تحميل الصفحة
            window.open(whatsappUrl, '_blank');
            window.location.reload();

        } catch (error) {
            console.error("خطأ:", error);
            alert("❌ فشل الحفظ في القاعدة.");
        }
    };
</script>
</body>
</html>
