<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - سبأ سنتر</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1a237e; /* نفس لون الخلفية في صورة الدخول */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-card {
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 360px;
            text-align: center;
        }
        h2 {
            color: #1a237e;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
            box-sizing: border-box;
            font-size: 14px;
            text-align: right;
            transition: 0.3s;
        }
        input:focus {
            border-color: #c5a059;
            box-shadow: 0 0 5px rgba(197, 160, 89, 0.3);
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background-color: #c5a059; /* اللون الذهبي كما في الصورة */
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-register:hover {
            background-color: #b08d4a;
        }
        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        .footer-text a {
            color: #1a237e;
            text-decoration: none;
            font-weight: bold;
        }
        #error-msg {
            color: #ff0000;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>إنشاء حساب جديد</h2>
        
        <div class="input-group">
            <input type="text" id="fullName" placeholder="الاسم الكامل">
        </div>
        
        <div class="input-group">
            <input type="text" id="uName" placeholder="اسم المستخدم">
        </div>
        
        <div class="input-group">
            <input type="text" id="phone" placeholder="رقم الهاتف">
        </div>
        
        <div class="input-group">
            <input type="password" id="p1" placeholder="كلمة المرور">
        </div>
        
        <div class="input-group">
            <input type="password" id="p2" placeholder="تأكيد كلمة المرور">
        </div>

        <button class="btn-register" onclick="handleRegister()">إنشاء الحساب</button>
        
        <p id="error-msg"></p>

        <div class="footer-text">
            لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
        </div>
    </div>

    <script>
        function handleRegister() {
            const user = document.getElementById("uName").value;
            const p1 = document.getElementById("p1").value;
            const p2 = document.getElementById("p2").value;
            const error = document.getElementById("error-msg");

            if (user === "" || p1 === "") {
                error.style.display = "block";
                error.innerHTML = "خطأ! يرجى ملء الحقول المطلوبة.";
            } else if (p1 !== p2) {
                error.style.display = "block";
                error.innerHTML = "خطأ! كلمات المرور غير متطابقة.";
            } else {
                alert("تم إنشاء حسابك بنجاح يا " + user);
                window.location.href = "login.html";
            }
        }
    </script>

</body>
</html>
