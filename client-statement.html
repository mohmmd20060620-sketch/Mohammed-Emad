<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
 
</script>
    <meta charset="UTF-8">
    <title>كشف حساب عميل | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- مكتبة Excel لميزة التصدير -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --main-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --accent-color: #0ea5e9;
            --bg-gray: #f1f5f9;
            --success: #10b981;
            --danger: #ef4444;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-gray); margin: 0; padding: 20px; color: #1e293b; }
        
        /* الحاوية الرئيسية */
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* الهيدر */
        .header { background: var(--main-gradient); color: white; padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--accent-color); }
        .header h2 { margin: 0; display: flex; align-items: center; gap: 12px; font-size: 24px; }

        /* قسم التحكم والبحث */
        .control-panel { padding: 20px; background: #fff; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; align-items: center; border-bottom: 1px solid #e2e8f0; }
        
        .search-box { position: relative; display: flex; align-items: center; }
        .search-box i { position: absolute; right: 15px; color: #94a3b8; }
        
        select, .input-filter { width: 100%; padding: 12px 40px 12px 15px; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.3s; font-size: 14px; background: #f8fafc; }
        select:focus, .input-filter:focus { border-color: var(--accent-color); background: #fff; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }

        /* الأزرار */
        .actions { display: flex; gap: 10px; padding: 0 20px 20px; background: #fff; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 14px; color: white; }
        .btn:active { transform: scale(0.95); }
        
        .btn-search { background: var(--accent-color); flex: 1; justify-content: center; }
        .btn-excel { background: #16a34a; }
        .btn-print { background: #64748b; }

        /* بطاقات الأرصدة التفاعلية */
        .balance-cards { display: flex; gap: 15px; padding: 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .card { flex: 1; padding: 20px; border-radius: 15px; color: white; position: relative; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card i { position: absolute; left: -10px; bottom: -10px; font-size: 80px; opacity: 0.1; }
        
        .yer { background: linear-gradient(135deg, #10b981, #059669); }
        .sar { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .usd { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        
        .card h4 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .card p { margin: 10px 0 0; font-size: 24px; font-weight: 800; }

        /* الجدول */
        .table-container { overflow-x: auto; padding: 0 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 10px 0; }
        th { background: #f8fafc; color: #64748b; padding: 15px; text-align: center; font-size: 13px; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; text-align: center; transition: 0.2s; }
        tr:hover td { background-color: #f0f9ff; }

        .debit { color: var(--danger); font-weight: bold; background: #fff5f5; border-radius: 6px; padding: 4px 8px; }
        .credit { color: var(--success); font-weight: bold; background: #f0fff4; border-radius: 6px; padding: 4px 8px; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-type { background: #e0f2fe; color: #0369a1; }

        /* حالة فارغة */
        .empty-state { text-align: center; padding: 50px; color: #94a3b8; }
        .empty-state i { font-size: 60px; margin-bottom: 15px; }

        @media print { 
            .control-panel, .actions, .btn, .header i, .badge { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; }
            .card { color: black !important; border: 1px solid #eee; background: none !important; }
            .card p { color: black; }

        }
        
    </style>
</head>
<body>

<div class="container">
    <!-- العنوان -->
    <div class="header">
        <h2><i class="fas fa-file-invoice-dollar"></i> كشف الحساب عميل</h2>
        <div style="display: flex; gap: 10px;">
            <a href="index.html" class="btn btn-print"><i class="fas fa-home"></i> الرئيسية</a>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div class="control-panel">
        <div class="search-box">
            <i class="fas fa-user"></i>
            <select id="clientSelect" onchange="loadStatement()">
                <option value="">-- اختر العميل --</option>
            </select>
        </div>
        <div class="search-box">
            <i class="fas fa-filter"></i>
            <input type="text" id="tableSearch" class="input-filter" placeholder="بحث سريع في العمليات..." onkeyup="filterTable()">
        </div>
        <button class="btn btn-search" onclick="loadStatement()">
            <i class="fas fa-sync-alt"></i> تحديث
        </button>
    </div>

    <div class="actions">
        <button class="btn btn-excel" onclick="exportToExcel()">
            <i class="fas fa-file-excel"></i> تصدير Excel
        </button>
        <button class="btn btn-print" onclick="window.print()">
            <i class="fas fa-print"></i> طباعة الكشف
        </button>
    </div>

    <!-- بطاقات الأرصدة -->
    <div class="balance-cards">
        <div class="card yer">
            <i class="fas fa-wallet"></i>
            <h4>ريال يمني</h4>
            <p id="balYER">0.00</p>
        </div>
        <div class="card sar">
            <i class="fas fa-coins"></i>
            <h4>ريال سعودي</h4>
            <p id="balSAR">0.00</p>
        </div>
        <div class="card usd">
            <i class="fas fa-dollar-sign"></i>
            <h4>دولار أمريكي</h4>
            <p id="balUSD">0.00</p>
        </div>
    </div>

    <!-- الجدول -->
    <div class="table-container">
        <table id="statementTable">
            <thead>
                <tr>
                    <th><i class="fas fa-calendar-alt"></i> التاريخ</th>
                    <th><i class="fas fa-tag"></i> النوع</th>
                    <th><i class="fas fa-comment-alt"></i> البيان / الملاحظات</th>
                    <th><i class="fas fa-money-bill-wave"></i> العملة</th>
                    <th><i class="fas fa-arrow-up"></i> مدين (عليه)</th>
                    <th><i class="fas fa-arrow-down"></i> دائن (له)</th>
                    <!-- يوضع داخل حلقة تكرار العمليات في جدول HTML -->
<td>
    <button class="btn-whatsapp" onclick="DB.sendWhatsAppReceipt('${op.client}', '${op.amount}', '${op.currency}', '${op.phone}')">
        إرسال سند 🟢
    </button>
</td>
                </tr>
            </thead>
            <tbody id="statementBody">
                <!-- سيتم ملؤه بواسطة JS -->
            </tbody>
        </table>
        <div id="noData" class="empty-state" style="display: none;">
            <i class="fas fa-folder-open"></i>
            <p>لا توجد بيانات لعرضها لهذا العميل</p>
        </div>
    </div>
</div>

<script src="database.js"></script>
<script>
    // 1. عند تشغيل الصفحة
    window.onload = function() {
        if (typeof DB === 'undefined') {
            alert("خطأ: ملف database.js غير موجود!"); return;
        }
        fillClientList();
    };

    function fillClientList() {
        const clients = DB.getClients();
        const select = document.getElementById('clientSelect');
        clients.forEach(client => {
            let option = document.createElement('option');
            option.value = client.name;
            option.textContent = client.name;
            select.appendChild(option);
        });
    }

    // 2. تحميل كشف الحساب مع المعالجة الحسابية
    function loadStatement() {
        const clientName = document.getElementById('clientSelect').value;
        const tbody = document.getElementById('statementBody');
        const noData = document.getElementById('noData');
        
        tbody.innerHTML = '';
        let totals = { YER: 0, SAR: 0, USD: 0 };

        if (!clientName) {
            updateBalanceCards(totals);
            return;
        }

        const operations = DB.getClientStatement(clientName);

        if (operations.length === 0) {
            noData.style.display = 'block';
            updateBalanceCards(totals);
            return;
        }

        noData.style.display = 'none';

        operations.forEach(op => {
            let debit = 0;  
            let credit = 0; 
            const currency = op.account || op.currency || 'YER';

            // المنطق المحاسبي الذكي
            if (op.type.includes("قبض") || op.type.includes("دائن") || op.type.includes("استلام")) {
                credit = parseFloat(op.amount);
                totals[currency] += credit;
            } else {
                debit = parseFloat(op.amount);
                totals[currency] -= debit;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${op.date}</td>
                <td><span class="badge badge-type">${op.type}</span></td>
                <td style="text-align:right">${op.notes || op.network || '-'}</td>
                <td><strong>${currency}</strong></td>
                <td><span class="${debit > 0 ? 'debit' : ''}">${debit > 0 ? debit.toLocaleString() : '-'}</span></td>
                <td><span class="${credit > 0 ? 'credit' : ''}">${credit > 0 ? credit.toLocaleString() : '-'}</span></td>
            `;
            tbody.appendChild(row);
        });

        updateBalanceCards(totals);
    }

    // 3. تحديث الأرصدة مع تنسيق الألوان (أحمر لو عليه، أخضر لو له)
    function updateBalanceCards(totals) {
        const currencies = ['YER', 'SAR', 'USD'];
        currencies.forEach(cur => {
            const val = totals[cur] || 0;
            const el = document.getElementById(`bal${cur}`);
            el.textContent = val.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            // تمييز الرصيد السالب باللون الأبيض مع تنبيه بصري بسيط
            el.style.color = val < 0 ? '#ffcfcf' : '#fff';
        });
    }

    // 4. ميزة البحث السريع (الفلترة) داخل الجدول
    function filterTable() {
        const input = document.getElementById('tableSearch').value.toLowerCase();
        const rows = document.getElementById('statementBody').getElementsByTagName('tr');

        for (let row of rows) {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(input) ? "" : "none";
        }
    }

    // 5. ميزة تصدير البيانات إلى ملف Excel
    function exportToExcel() {
        const clientName = document.getElementById('clientSelect').value || 'كشف_حساب';
        const table = document.getElementById('statementTable');
        const wb = XLSX.utils.table_to_book(table, { sheet: "Kashf" });
        XLSX.writeFile(wb, `${clientName}_${new Date().toLocaleDateString()}.xlsx`);
    }
</script>

</body>
</html>
