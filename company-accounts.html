<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
    if (!sessionStorage.getItem('isLoggedIn')) {
        window.location.href = 'login.html';
    }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة أرصدة الافتتاحيه لي الصناديق | إتقان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #0f172a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        /* استايل القائمة الجانبية المصغر */
        .sidebar { width: 250px; background: var(--sidebar-bg); color: white; height: 100vh; padding: 20px; box-sizing: border-box; }
        .sidebar a { color: #94a3b8; text-decoration: none; display: block; padding: 12px; margin-bottom: 5px; border-radius: 8px; font-size: 14px; }
        .sidebar a:hover, .sidebar a.active { background: #1e293b; color: white; }

        .main-content { flex: 1; padding: 40px; }
        .header-title { border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .accounts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .account-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .currency-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; color: #1e293b; }
        .currency-title i { margin-left: 10px; color: var(--accent); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #64748b; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; font-weight: bold; box-sizing: border-box; }
        
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-save:hover { background: #2563eb; transform: translateY(-2px); }
        
        .status-msg { margin-top: 15px; text-align: center; font-size: 13px; display: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h3 style="text-align: center;">إتقان</h3>
        <a href="index.html"><i class="fas fa-home"></i> العودة للرئيسية</a>
        <a href="company-accounts.html" class="active"><i class="fas fa-university"></i> أرصدة الشركة</a>
        <a href="send-remittance.html"><i class="fas fa-paper-plane"></i> إرسال حوالة</a>
    </aside>

    <main class="main-content">
        <div class="header-title">
            <h2>إدارة أرصدة وصناديق الشركة</h2>
            <i class="fas fa-vault fa-2x" style="color: #cbd5e1;"></i>
        </div>

        <div class="accounts-grid">
            <div class="account-card">
                <div class="currency-title"><i class="fas fa-dollar-sign"></i> صندوق الدولار (USD)</div>
                <div class="form-group">
                    <label>الرصيد الحالي</label>
                    <input type="number" id="input-usd" placeholder="0.00">
                </div>
                <button class="btn-save" onclick="saveNewBalances()">تحديث رصيد الدولار</button>
            </div>

            <div class="account-card">
                <div class="currency-title"><i class="fas fa-money-bill-wave"></i> صندوق السعودي (SAR)</div>
                <div class="form-group">
                    <label>الرصيد الحالي</label>
                    <input type="number" id="input-sar" placeholder="0">
                </div>
                <button class="btn-save" onclick="saveNewBalances()">تحديث رصيد السعودي</button>
            </div>

            <div class="account-card">
                <div class="currency-title"><i class="fas fa-coins"></i> صندوق اليمني (YER)</div>
                <div class="form-group">
                    <label>الرصيد الحالي</label>
                    <input type="number" id="input-yer" placeholder="0">
                </div>
                <button class="btn-save" onclick="saveNewBalances()">تحديث رصيد اليمني</button>
            </div>
        </div>
        
        <div id="status" class="status-msg" style="color: #10b981;">تم تحديث الأرصدة في قاعدة البيانات بنجاح! <i class="fas fa-check-circle"></i></div>
    </main>

    <script src="database.js"></script>
    <script src="database.js"></script>
<script>
    // عند فتح الصفحة، نجلب الأرصدة الحالية من القاعدة ونضعها في الحقول
    window.onload = function() {
        // نستخدم الإحصائيات الحقيقية المحسوبة من العمليات لملء الحقول
        const ops = DB.getOperations();
        const currentBalances = {
            USD: ops.filter(op => op.currency === 'USD').reduce((sum, op) => sum + (op.type.includes('صرف') ? -op.amount : op.amount), 0),
            SAR: ops.filter(op => op.currency === 'SAR').reduce((sum, op) => sum + (op.type.includes('صرف') ? -op.amount : op.amount), 0),
            YER: ops.filter(op => op.currency === 'YER').reduce((sum, op) => sum + (op.type.includes('صرف') ? -op.amount : op.amount), 0)
        };
        
        document.getElementById('input-usd').value = currentBalances.USD || 0;
        document.getElementById('input-sar').value = currentBalances.SAR || 0;
        document.getElementById('input-yer').value = currentBalances.YER || 0;
    }

    // وظيفة الحفظ المصلحة للربط مع كشف الحركة
    function saveNewBalances() {
        const currencies = [
            { id: 'input-usd', code: 'USD', name: 'الدولار' },
            { id: 'input-sar', code: 'SAR', name: 'السعودي' },
            { id: 'input-yer', code: 'YER', name: 'اليمني' }
        ];

        let hasChanged = false;

        currencies.forEach(curr => {
            const newValue = parseFloat(document.getElementById(curr.id).value) || 0;
            
            // للحفاظ على دقة كشف الحركة، نسجل "تعديل رصيد" أو "رصيد افتتاحي" 
            // إذا كان المستخدم يريد تصفير الحساب أو البدء من جديد
            
            // 1. تحديث الرصيد الثابت كمرجع
            let balances = DB.getBalances();
            balances[curr.code] = newValue;
            DB.saveBalances(balances);

            // 2. إضافة عملية في كشف الحركة لكي يظهر الرقم في الشاشة الرئيسية والكشوفات
            DB.addOperation({
                type: "رصيد افتتاحي / تعديل",
                client: "نظام الصناديق",
                amount: newValue,
                currency: curr.code,
                notes: `ضبط الرصيد الافتتاحي لصندوق ${curr.name}`,
                date: new Date().toISOString()
            });
            
            hasChanged = true;
        });

        if (hasChanged) {
            // تحديث إحصائيات النظام فوراً
            if(typeof Dashboard !== 'undefined') Dashboard.updateStats();

            // إظهار رسالة نجاح
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.innerHTML = 'تم تحديث الأرصدة وتسجيلها في كشف الحركة بنجاح! <i class="fas fa-check-circle"></i>';
            setTimeout(() => { status.style.display = 'none'; }, 3000);
        }
    }
</script>
</body>
</html>
