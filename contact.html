<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - سبأ سنتر</title>
    <style>
        :root {
            --primary: #800000;
            --secondary: #c5a059;
            --whatsapp: #25D366;
            --telegram: #0088cc;
            --phone: #1a237e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1a237e;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .contact-container {
            background: #fff;
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .contact-header {
            background: var(--primary);
            color: white;
            padding: 25px;
            text-align: center;
            border-bottom: 5px solid var(--secondary);
        }

        .contact-header h2 { margin: 0; font-size: 22px; }

        .section-box {
            margin: 15px;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 20px;
        }

        .section-title {
            text-align: center;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 12px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .action-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: #fff;
        }

        .action-card img {
            width: 40px;
            margin-bottom: 8px;
        }

        .num-text {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            direction: ltr;
        }

        .type-label {
            font-size: 11px;
            color: #777;
            margin-top: 4px;
        }

        .full-width-card {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            gap: 15px;
        }

        .back-home {
            display: block;
            text-align: center;
            padding: 15px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            font-weight: bold;
            margin: 15px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="contact-container">
    <div class="contact-header">
        <h2>مركز سبأ</h2>
        <div style="font-size: 12px; color: var(--secondary);">Saba Center - التواصل المباشر</div>
    </div>

    <div class="section-box">
        <div class="section-title">
             واتساب وتلجرام
        </div>
        <div class="grid-buttons">
            <a href="https://wa.me/967777352046" class="action-card">
                <img src="https://img.icons8.com/color/48/whatsapp.png">
                <span class="num-text">777352046</span>
                <span class="type-label">مراسلة فورية</span>
            </a>
            <a href="https://t.me/967776610105" class="action-card">
                <img src="https://img.icons8.com/fluency/48/telegram-app.png">
                <span class="num-text">776610105</span>
                <span class="type-label">قناة الخدمة</span>
            </a>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">
             خدمة العملاء (إتصال)
        </div>
        <div class="grid-buttons">
            <a href="tel:711596637" class="action-card">
                <img src="https://img.icons8.com/fluency/48/phone.png">
                <span class="num-text">711596637</span>
            </a>
            <a href="tel:711594854" class="action-card">
                <img src="https://img.icons8.com/fluency/48/phone.png">
                <span class="num-text">711594854</span>
            </a>
            <a href="tel:735003050" class="action-card">
                <img src="https://img.icons8.com/fluency/48/phone.png">
                <span class="num-text">735003050</span>
            </a>
            <a href="tel:04352199" class="action-card">
                <img src="https://img.icons8.com/fluency/48/landline.png">
                <span class="num-text">04/352199</span>
            </a>
        </div>
    </div>

    <a href="./saba_center.html" class="back-home-btn">العودة للقائمة الرئيسية</a>
</div>

</body>
</html>
