<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محرك بحث النظام المصرفي | إتقان برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التنسيق اللوني المستوحى من الصورة والأنظمة المصرفية */
        :root { --panel-bg: #e3d9b0; --header-bg: #f8f4e1; --border-color: #7a7a7a; }
        body { font-family: 'Tahoma', sans-serif; background-color: #7395d9; margin: 0; padding: 15px; }
        
        .main-window { background-color: var(--panel-bg); border: 2px solid #444; border-radius: 3px; padding: 10px; min-height: 90vh; }
        
        /* شريط العنوان الصغير */
        .window-title { background: white; border: 1px solid var(--border-color); display: inline-block; padding: 2px 20px; font-size: 14px; font-weight: bold; margin-bottom: -1px; position: relative; z-index: 5; }

        /* منطقة البحث العلوي */
        .search-panel { background-color: var(--header-bg); border: 1px solid var(--border-color); padding: 20px; display: flex; justify-content: center; align-items: center; gap: 50px; position: relative; margin-bottom: 10px; }
        
        .exit-section { position: absolute; right: 15px; top: 15px; text-align: center; }
        .btn-exit { background: #fff; border: 1px solid #999; padding: 5px 15px; cursor: pointer; transition: 0.2s; }
        .btn-exit:hover { background: #eee; }
        .btn-exit i { font-size: 28px; color: #2b579a; display: block; }

        .search-field { display: flex; flex-direction: column; align-items: center; }
        .search-field label { font-weight: bold; font-size: 13px; margin-bottom: 8px; color: #333; }
        .search-field input { width: 220px; padding: 6px; border: 1px solid #666; text-align: center; font-family: 'Consolas', monospace; }

        /* الجدول المصرفي */
        .grid-container { background: white; border: 1px solid #444; height: 550px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #eee; border: 1px solid #888; padding: 8px; font-size: 13px; position: sticky; top: 0; }
        tbody td { border: 1px solid #ddd; padding: 7px; text-align: center; font-size: 13px; background-color: #fdfdf0; }
        tbody tr:nth-child(even) td { background-color: #f4f8e0; }
        
        /* تمييز المبالغ والعملات */
        .amt-cell { font-weight: bold; color: #000; }
        .curr-cell { color: #2e7d32; font-weight: bold; }
        .type-cell { color: #1565c0; }
    </style>
</head>
<body>

<div class="window-title">محرك البحث - النظام المصرفي المتكامل</div>

<div class="main-window">
    <div class="search-panel">
        <div class="exit-section">
            <button class="btn-exit" onclick="window.history.back()">
                <i class="fas fa-door-open"></i>
                <span>خروج</span>
            </button>
        </div>

        <div class="search-field">
            <label>رقم العملية / الحوالة</label>
            <input type="text" id="opId" placeholder="0000" oninput="bankingSearch()">
        </div>

        <div class="search-field">
            <label>اسم العميل / المستفيد</label>
            <input type="text" id="clientName" placeholder="بحث بالاسم..." oninput="bankingSearch()">
        </div>
    </div>

    <div class="grid-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 100px;">رقم العملية</th>
                    <th style="width: 150px;">نوع العملية</th>
                    <th style="width: 120px;">التاريخ</th>
                    <th>بيان الحساب / العميل</th>
                    <th style="width: 120px;">المبلغ</th>
                    <th style="width: 80px;">الخصم</th>
                    <th style="width: 120px;">العملة</th>
                </tr>
            </thead>
            <tbody id="bankingData">
                <!-- البيانات ستظهر هنا -->
            </tbody>
        </table>
    </div>
</div>

<script src="database.js"></script>
<script>
   // داخل ملف banking-search.html - الجزء الخاص بالسكربت
function bankingSearch() {
    const idVal = document.getElementById('opId').value.toLowerCase();
    const nameVal = document.getElementById('clientName').value.toLowerCase();
    const tbody = document.getElementById('bankingData');

    // جلب العمليات من قاعدة البيانات المركزية
    const allOperations = (typeof DB !== 'undefined') ? DB.getOperations() : [];

    // التصفية البرمجية: إظهار "إرسال الحوالات" فقط وحجب بقية العمليات
    const filtered = allOperations.filter(op => {
        const isRemittance = op.type && op.type.includes("إرسال حوالة"); 
        const matchId = op.id && op.id.toString().includes(idVal);
        const matchName = op.client && op.client.toLowerCase().includes(nameVal);
        return isRemittance && matchId && matchName;
    });

    tbody.innerHTML = "";
    filtered.forEach(op => {
        const row = document.createElement('tr');
        row.style.cursor = "pointer";
        
        // ميزة إضافية: عند الضغط على الصف يتم فتح تفاصيل الحوالة للتعديل
        row.onclick = () => {
            if(confirm("هل تريد الانتقال لتعديل الحوالة رقم: " + op.id + "؟")) {
                window.location.href = `send-remittance.html?edit=${op.id}`;
            }
        };

        row.innerHTML = `
            <td>${op.id}</td>
            <td class="type-cell" style="color: #c2410c;">${op.type}</td>
            <td>${op.date ? op.date.split('T')[0] : '---'}</td>
            <td style="text-align: right; padding-right: 20px;">${op.client}</td>
            <td class="amt-cell">${parseFloat(op.amount || 0).toLocaleString()}</td>
            <td>${op.discount || '0.00'}</td>
            <td class="curr-cell">${formatCurrency(op.currency)}</td>
        `;
        tbody.appendChild(row);
    });
}

</script>

</body>
</html>
